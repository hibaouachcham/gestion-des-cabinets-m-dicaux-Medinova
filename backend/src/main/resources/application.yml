spring:
  application:
    name: medinova-backend
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/medinova?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:Hiba123@#}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    open-in-view: false  # Désactive open-in-view pour éviter les warnings
    properties:
      hibernate:
        # dialect: org.hibernate.dialect.MySQLDialect  # Commenté - Hibernate détecte automatiquement
        format_sql: true
    # database-platform: org.hibernate.dialect.MySQLDialect  # Commenté - Hibernate détecte automatiquement
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  
  sql:
    init:
      mode: never  # Ne pas réexécuter les scripts SQL à chaque démarrage
      # schema-locations: classpath:schema.sql  # Commenté pour éviter la suppression des tables
      # data-locations: classpath:data.sql  # Commenté pour éviter la réinitialisation des données

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:24h}  # 24 heures au lieu de 30 minutes
      cookie:
        http-only: true
        secure: false
        same-site: lax
        name: JSESSIONID
        max-age: 86400  # 24 heures en secondes

logging:
  level:
    com.medinova: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:DEBUG}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:DEBUG}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

medinova:
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  pdf:
    output-dir: ${PDF_OUTPUT_DIR:./pdf-output}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

---
spring:
  config:
    activate:
      on-profile: prod
  
  datasource:
    url: ${DATABASE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  
  sql:
    init:
      mode: never

server:
  servlet:
    session:
      cookie:
        secure: true

logging:
  level:
    root: INFO
    com.medinova: INFO

